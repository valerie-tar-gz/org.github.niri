app-id: org.github.niri
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm22
finish-args:
  - --socket=wayland
command: niri
modules:

  - name: libseat
    buildsystem: meson
    sources:
      - type: git
        url: 'https://github.com/kennylevinsen/seatd'
        commit: daa8196e10b180b8b0caeafa8e5f860eb1bd6706

  - name: dos2unix
    buildsystem: simple
    build-commands:
      - make prefix="/app" clean all
      - make prefix="/app" install
    sources:
      - type: archive
        url: 'https://waterlan.home.xs4all.nl/dos2unix/dos2unix-7.5.4.tar.gz'
        sha256: f811a2b9e4a0c936c61ef7c1732993d1820e5cf011f4d93861885ccb8101ca21

  - name: hwdata
    buildsystem: simple
    build-commands:
      - ./configure --prefix=/app
      - make download install
    sources:
      - type: git
        url: 'https://github.com/vcrhonek/hwdata'
        commit: be46d7186e918e62eb75de399e800145a781c8db
      - type: file
        path: hwdata-files/pci.ids
        dest-filename: pci.ids.downloaded
        sha256: 31e592452dcd27e532090acd2d2717724e6b4a91610a6ced5e4aaf4212e827c6
      - type: file
        path: hwdata-files/usb.ids
        dest-filename: usb.ids.downloaded
        sha256: 4841f06d041dfc4f0dbf68001f3e21c47b3d9eb3d5acc03a482ba85e344471aa
      - type: file
        path: hwdata-files/oui.txt
        dest-filename: oui.txt.downloaded
        sha256: f774c5cb18be0068a15c17a3e8de84a38ef1d806f6f68304927bd3a742b54ce9
      - type: file
        path: hwdata-files/iab.txt
        dest-filename: iab.txt.downloaded
        sha256: 7d5d056c44873ebf47bc71b3c060773c1b1e1da501703d118bbe5d07c2fade65
      - type: file
        path: 'hwdata-files/PNP ID Registry.csv'
        dest-filename: pnp.ids.csv
        sha256: c570d5d07af197aff702b653b9f616314399874957074b96bcb082ce02fdaa24

  - name: libdisplay-info
    buildsystem: meson
    sources:
      - type: git
        url: 'https://gitlab.freedesktop.org/emersion/libdisplay-info'
        commit: 47a5590e9c4eb35d67651b8c05a55f1a48259329
      - type: patch
        path: libdisplay-info-hwdata-prefix.patch

  - name: check
    buildsystem: cmake
    sources:
      - type: git
        url: 'https://github.com/libcheck/check'
        commit: 11970a7e112dfe243a2e68773f014687df2900e8

  - name: mtdev
    buildsystem: simple
    build-commands:
      - ./configure --prefix=/app
      - make install
    sources:
      - type: archive
        url: 'https://bitmath.se/org/code/mtdev/mtdev-1.1.7.tar.gz'
        sha256: a55bd02a9af4dd266c0042ec608744fff3a017577614c057da09f1f4566ea32c

  - name: libdisplay-info
    buildsystem: meson
    sources:
      - type: git
        url: 'https://gitlab.freedesktop.org/emersion/libdisplay-info'
        commit: 47a5590e9c4eb35d67651b8c05a55f1a48259329

  - name: libevdev
    buildsystem: meson
    sources:
      - type: git
        url: 'https://gitlab.freedesktop.org/libevdev/libevdev'
        commit: 139b58e135184f66a35c2401771f3d8134f097ad

  - name: libwacom
    buildsystem: meson
    modules:
      - pypi-dependencies.json
    sources:
      - type: git
        url: 'https://github.com/linuxwacom/libwacom'
        commit: 44df53b14b008a8252427aa6b41128efada43b3a

  - name: libinput
    buildsystem: meson
    sources:
      - type: git
        url: 'https://gitlab.freedesktop.org/libinput/libinput'
        commit: 042c5e6fd9cc910307027a1522453794b29f2c72

  - name: niri
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm22/bin
      append-ld-library-path: /usr/lib/sdk/llvm22/lib
      env:
        CARGO_HOME: /run/build/niri/cargo
        CARGO_NET_OFFLINE: 'true'
        LIBCLANG_PATH: /usr/lib/sdk/llvm22/lib
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo build --offline --release --all-features
      - install -Dm0755 target/release/niri ${FLATPAK_DEST}/bin/niri
    sources:
      - type: git
        url: https://github.com/niri-wm/niri
        commit: b35bcae35b3f9665043c335e55ed5828af77db85
      - cargo-sources.json

######## Below this is foot

  # host-spawn is a tool required to run host terminal from flatpak sandbox
  - name: libutf8proc
    builddir: true
    buildsystem: cmake
    sources:
      - type: git
        url: https://github.com/JuliaStrings/utf8proc.git
        commit: e5e799221b45bbb90f5fdc5c69b6b8dfbf017e78
        tag: v2.11.3
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
  - name: tllist
    builddir: true
    buildsystem: meson
    sources:
      - type: git
        url: https://codeberg.org/dnkl/tllist.git
        commit: 8dcb0725c73eee9e350f41a921faf0bcd2ab9920
        tag: 1.1.0
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$
  - name: fcft
    builddir: true
    buildsystem: meson
    config-opts:
      - -Dgrapheme-shaping=enabled
      - -Drun-shaping=enabled
    sources:
      - type: git
        url: https://codeberg.org/dnkl/fcft.git
        commit: 38de2ae450df667ac71ba4811fe535aa1954a217
        tag: 3.3.3
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$
  - name: foot
    builddir: true
    buildsystem: meson
    config-opts:
      - -Dterminfo=disabled
    sources:
      - type: git
        url: https://codeberg.org/dnkl/foot.git
        commit: b44a62724cd51c7fecdfd9d1b41a3691b11a4c27
        tag: 1.25.0
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$

  - name: build
    buildsystem: cmake
    builddir: true
    config-opts:
      - -DCMAKE_INSTALL_PREFIX=/app
    sources:
      - type: archive
        url: https://github.com/fastfetch-cli/fastfetch/archive/refs/tags/2.59.0.zip
        sha256: 9814ff6315ef9e20c2920b88db4ee2a0d521283d85ece26dae3d2a528bde99d8
